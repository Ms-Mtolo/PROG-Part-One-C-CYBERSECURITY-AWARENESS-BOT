# GitHub Actions workflow for Cybersecurity Awareness Bot

name: Cybersecurity Awareness Bot CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # Solution configuration
  SOLUTION_NAME: prog part one.slnx
  CONFIGURATION: Release
  DOTNET_VERSION: 8.0.x
  
  # Project paths (update these to match your actual project structure)
  PROJECT_PATH: .
  OUTPUT_PATH: ./publish
  
  # Note: Since this is a console app, test project and WAP paths are optional
  # Uncomment and update if you have these in your project
  # TEST_PROJECT_PATH: tests/CybersecurityBot.Tests/CybersecurityBot.Tests.csproj
  # WAP_PROJECT_DIRECTORY: ./package
  # WAP_PROJECT_PATH: ./package/CybersecurityBot.Package.wapproj

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore dependencies
      run: msbuild "${{ env.SOLUTION_NAME }}" /t:Restore /p:Configuration=${{ env.CONFIGURATION }}
    
    - name: Build solution
      run: msbuild "${{ env.SOLUTION_NAME }}" /p:Configuration=${{ env.CONFIGURATION }}
    
    - name: Verify required files
      run: |
        Write-Host "========================================="
        Write-Host "  VERIFYING PROJECT FILES"
        Write-Host "========================================="
        
        # Check solution file
        if (Test-Path "${{ env.SOLUTION_NAME }}") {
            Write-Host "✓ Solution found: ${{ env.SOLUTION_NAME }}" -ForegroundColor Green
        } else {
            Write-Host "✗ Solution not found!" -ForegroundColor Red
            exit 1
        }
        
        # Check Program.cs
        if (Test-Path "${{ env.PROJECT_PATH }}/Program.cs") {
            Write-Host "✓ Program.cs found" -ForegroundColor Green
        } else {
            Write-Host "✗ Program.cs not found!" -ForegroundColor Red
            exit 1
        }
        
        # Check greeting.wav
        if (Test-Path "greeting.wav") {
            Write-Host "✓ greeting.wav found" -ForegroundColor Green
        } else {
            Write-Host "⚠ greeting.wav not found (text fallback will be used)" -ForegroundColor Yellow
        }
    
    - name: Publish application
      run: |
        dotnet publish "${{ env.SOLUTION_NAME }}" `
          --configuration ${{ env.CONFIGURATION }} `
          --output ${{ env.OUTPUT_PATH }} `
          --runtime win-x64 `
          --self-contained false
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CybersecurityBot
        path: ${{ env.OUTPUT_PATH }}
