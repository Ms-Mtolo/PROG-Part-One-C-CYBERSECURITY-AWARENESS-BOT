name: prog part one

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Check for required files
      run: |
        # Check if Program.cs exists
        if [ ! -f "Program.cs" ]; then
          echo "Error: Program.cs not found!"
          exit 1
        fi
        
        # Check if .csproj file exists
        if [ ! -f "*.csproj" ]; then
          echo "Error: No .csproj file found!"
          exit 1
        fi
        
        # Warn if greeting.wav is missing (optional)
        if [ ! -f "greeting.wav" ]; then
          echo "Warning: greeting.wav not found - voice feature will use text fallback"
        fi
        
        echo "All checks passed!"
    
    - name: Publish
      run: dotnet publish --configuration Release --output ./publish
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CybersecurityBot
        path: ./publish/
